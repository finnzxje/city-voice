name: city_voice
description: "CityVoice – Civic Issue Reporting Platform for Ho Chi Minh City"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI / Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Data Models (code generation)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.2.4

  # Location & Maps
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Camera / Image Picker
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.20.2

  # Real-time & Notifications
  stomp_dart_client: ^2.0.0
  badges: ^3.1.2
  timeago: ^3.7.0

  # Analytics & Reporting
  fl_chart: ^0.68.0
  open_filex: ^4.3.4
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
