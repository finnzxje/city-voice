spring:
  application:
    name: cityvoice

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:cityvoice}
    username: ${DB_USER:cityvoice}
    password: ${DB_PASSWORD:cityvoice_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate only validates
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.cityvoice: INFO
    org.flywaydb: INFO
