spring:
  application:
    name: cityvoice

  config:
    import: optional:file:.env[.properties]  # loads backend/.env automatically

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:cityvoice}
    username: ${DB_USER:cityvoice}
    password: ${DB_PASSWORD:cityvoice_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # Gmail SMTP configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    context-path: /api

# Application-specific settings
app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:change-me-in-production-access-secret-32chars}
    access-expiration-ms: 9000000        # 150 minutes
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-in-production-refresh-secret-32chars}
    refresh-expiration-ms: 604800000    # 7 days

  otp:
    verification-expiration-minutes: 15  # Email verification OTP (registration)
    login-expiration-minutes: 10          # Login OTP

  admin:
    email: ${ADMIN_EMAIL:admin@cityvoice.vn}
    password: ${ADMIN_PASSWORD:Admin@123}
    full-name: "System Administrator"

  seed:
    citizen:
      email: ${SEED_CITIZEN_EMAIL:citizen@cityvoice.vn}
      password: ${SEED_CITIZEN_PASSWORD:Citizen@123}
      full-name: "Test Citizen"
    staff:
      email: ${SEED_STAFF_EMAIL:staff@cityvoice.vn}
      password: ${SEED_STAFF_PASSWORD:Staff@123}
      full-name: "Test Staff"
    manager:
      email: ${SEED_MANAGER_EMAIL:manager@cityvoice.vn}
      password: ${SEED_MANAGER_PASSWORD:Manager@123}
      full-name: "Test Manager"

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:cityvoice-reports}

logging:
  level:
    com.cityvoice: DEBUG
    org.flywaydb: INFO
    org.springframework.security: INFO
